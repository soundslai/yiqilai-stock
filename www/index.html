// ====== UTILITIES ======
function $(id) { return document.getElementById(id); }

function toast(msg) {
    var t = $("tt");
    if (!t) return;
    t.textContent = msg;
    clearTimeout(t._to);
    t.className = "toast sh";
    t._to = setTimeout(function() { t.className = "toast"; }, 1800);
}

function login(u, p) {
    for (var i = 0; i < USERS.length; i++) {
        if (USERS[i].u === u && USERS[i].p === p) {
            CUR = USERS[i];
            localStorage.setItem("yu_c", u);
            var wd = localStorage.getItem("yw_" + u);
            W = wd ? JSON.parse(wd) : [];
            updateUI();
            return true;
        }
    }
    return false;
}

function reg(u, p) {
    for (var i = 0; i < USERS.length; i++) {
        if (USERS[i].u === u) return false;
    }
    USERS.push({u: u, p: p, t: Date.now()});
    localStorage.setItem("yu", JSON.stringify(USERS));
    return login(u, p);
}

function logout() {
    CUR = null;
    localStorage.removeItem("yu_c");
    W = [];
    updateUI();
    toast("已退出登录");
}

function updateUI() {
    var d = $("uS");
    var b = $("lB");
    if (d) d.textContent = CUR ? CUR.u : "未登录";
    if (b) b.textContent = CUR ? "退出" : "登录";
    var s = $("dS");
    if (s) s.textContent = "\u00b7 " + (SIM ? "模拟" : "实时");
}

function toggleDS() {
    SIM = !SIM;
    localStorage.setItem("ys", SIM ? "" : "f");
    toast("已切换为" + (SIM ? "模拟数据" : "实时行情"));
    renderAll();
    updateUI();
}

function inWatch(code) {
    return W.indexOf(code) > -1;
}

function toggleWatch(code) {
    var i = W.indexOf(code);
    if (i > -1) {
        W.splice(i, 1);
        toast("已移除自选");
    } else {
        W.push(code);
        toast("已添加自选");
    }
    if (CUR) {
        localStorage.setItem("yw_" + CUR.u, JSON.stringify(W));
    } else {
        localStorage.setItem("yw", JSON.stringify(W));
    }
    renderAll();
}

function fmtPct(v) {
    if (v >= 0) return "+" + v.toFixed(2) + "%";
    return "-" + Math.abs(v).toFixed(2) + "%";
}

function pCls(v) { return v >= 0 ? "r" : "g"; }
function pCol(v) { return v >= 0 ? "var(--red)" : "var(--green)"; }


// ====== VIP APPLICATION SYSTEM ======
function getVIPApps() {
    return JSON.parse(localStorage.getItem("yv_apps") || "[]");
}
function saveVIPApps(apps) {
    localStorage.setItem("yv_apps", JSON.stringify(apps));
}
function isVIP() {
    if (!CUR) return false;
    if (CUR.r === "admin") return true;
    var apps = getVIPApps();
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === CUR.u && apps[i].approved) return true;
    }
    return false;
}
function refreshVIP() {
    VIP = isVIP();
    updateUI();
}
function applyVIP() {
    if (!CUR) { toast("请先登录"); return; }
    if (isVIP()) { toast("您已是会员"); return; }
    var apps = getVIPApps();
    // Check if already applied
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === CUR.u) {
            if (apps[i].approved) { toast("您已是会员"); return; }
            toast("已提交申请，请等待管理员审核");
            return;
        }
    }
    apps.push({u: CUR.u, t: Date.now(), approved: false});
    saveVIPApps(apps);
    toast("会员申请已提交，请联系管理员(admin)审核");
}
function showAdminPanel() {
    if (!CUR || CUR.r !== "admin") { toast("无权限"); return; }
    var apps = getVIPApps();
    var pending = apps.filter(function(a) { return !a.approved && !a.rejected; });
    var approved = apps.filter(function(a) { return a.approved; });
    var m = document.createElement("div");
    m.className = "mo sh";
    m.onclick = function(e) { if (e.target === this) m.remove(); };
    var h = '<div class="mx"><h3>🔐 管理员后台</h3><div class="st" style="font-size:12px">👤 当前管理员：' + CUR.u + '</div>';
    h += '<div class="st">📋 待审核会员申请 (' + pending.length + ')</div>';
    if (pending.length === 0) {
        h += '<div style="font-size:11px;color:var(--t3);padding:8px;text-align:center">暂无待审核申请</div>';
    } else {
        for (var i = 0; i < pending.length; i++) {
            var a = pending[i];
            var dt = new Date(a.t);
            h += '<div style="background:var(--bg);border-radius:8px;padding:8px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">';
            h += '<div><div style="font-weight:600;font-size:13px">👤 ' + a.u + '</div><div style="font-size:10px;color:var(--t3)">申请时间：' + dt.toLocaleString() + '</div></div>';
            h += '<div style="display:flex;gap:4px"><button class="bs bp" style="font-size:10px;padding:4px 8px" onclick="approveVIP(\'' + a.u + '\');document.querySelector(\'.mo.sh\').remove();showAdminPanel()">✅ 通过</button>';
            h += '<button class="bs bo" style="font-size:10px;padding:4px 8px" onclick="rejectVIP(\'' + a.u + '\');document.querySelector(\'.mo.sh\').remove();showAdminPanel()">❌ 拒绝</button></div></div>';
        }
    }
    if (approved.length > 0) {
        h += '<div class="st">✅ 已通过会员 (' + approved.length + ')</div>';
        for (var i = 0; i < approved.length; i++) {
            h += '<div style="font-size:11px;padding:4px 6px;color:var(--green)">✅ ' + approved[i].u + '</div>';
        }
    }
    h += '<button class="bs bo" style="width:100%;padding:6px;margin-top:6px" onclick="document.querySelector(\'.mo.sh\').remove()">关闭</button></div>';
    m.innerHTML = h;
    document.body.appendChild(m);
}
function approveVIP(u) {
    var apps = getVIPApps();
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === u) { apps[i].approved = true; break; }
    }
    saveVIPApps(apps);
    toast("已通过 " + u + " 的会员申请");
    refreshVIP();
}
function rejectVIP(u) {
    var apps = getVIPApps();
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === u) { apps.splice(i, 1); break; }
    }
    saveVIPApps(apps);
    toast("已拒绝 " + u + " 的会员申请");
    refreshVIP();
}

// ====== K-LINE ======
function genKL(base, n) {
    var r = [];
    var p = base;
    for (var i = n - 1; i >= 0; i--) {
        var o = p * (1 + (Math.random() - 0.5) * 0.03);
        var c = o * (1 + (Math.random() - 0.5) * 0.04);
        var h = Math.max(o, c) * (1 + Math.random() * 0.015);
        var l = Math.min(o, c) * (1 - Math.random() * 0.015);
        p = c;
        r.push({
            t: new Date(Date.now() - i * 86400000).toLocaleDateString("zh-CN", {month:"2-digit",day:"2-digit"}),
            o: Math.round(o * 100) / 100,
            c: Math.round(c * 100) / 100,
            h: Math.round(h * 100) / 100,
            l: Math.round(l * 100) / 100
        });
    }
    return r;
}

function drawKL(canvasId, data) {
    var cv = document.getElementById(canvasId);
    if (!cv || data.length < 2) return;
    var ctx = cv.getContext("2d");
    var W = cv.parentElement.clientWidth - 20 || 340;
    var H = 200;
    cv.width = W * 2;
    cv.height = H * 2;
    cv.style.width = W + "px";
    cv.style.height = H + "px";
    ctx.scale(2, 2);
    ctx.clearRect(0, 0, W, H);
    
    var pt = 25, pb = 30, pl = 50, pr = 15;
    var cw = W - pl - pr;
    var ch = H - pt - pb;
    var hi = -Infinity, lo = Infinity;
    for (var i = 0; i < data.length; i++) {
        if (data[i].h > hi) hi = data[i].h;
        if (data[i].l < lo) lo = data[i].l;
    }
    var rg = hi - lo || 1;
    
    function y(v) { return pt + ch - (v - lo) / rg * ch; }
    function x(i) { return pl + (i / (data.length - 1)) * cw; }
    
    // Grid lines
    ctx.strokeStyle = "#e0e0e0";
    ctx.lineWidth = 0.5;
    for (var i = 0; i <= 4; i++) {
        var yy = pt + (ch / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pl, yy);
        ctx.lineTo(pl + cw, yy);
        ctx.stroke();
        ctx.fillStyle = "#999";
        ctx.font = "9px sans-serif";
        ctx.fillText((hi - (i / 4) * rg).toFixed(2), 2, yy + 3);
    }
    
    // Candles
    for (var i = 0; i < data.length; i++) {
        var d = data[i];
        var xi = x(i);
        var wi = cw / data.length * 0.6;
        var isUp = d.c >= d.o;
        ctx.strokeStyle = isUp ? "#E53935" : "#43A047";
        ctx.fillStyle = isUp ? "#E53935" : "#43A047";
        ctx.lineWidth = 1;
        // Wick
        ctx.beginPath();
        ctx.moveTo(xi, y(d.h));
        ctx.lineTo(xi, y(d.l));
        ctx.stroke();
        // Body
        var bodyTop = y(Math.max(d.o, d.c));
        var bodyBot = y(Math.min(d.o, d.c));
        if (isUp) {
            ctx.fillRect(xi - wi/2, bodyTop, wi, bodyBot - bodyTop);
        } else {
            ctx.fillRect(xi - wi/2, bodyTop, wi, bodyBot - bodyTop);
        }
        // Date labels
        if (i % Math.ceil(data.length / 5) === 0 || i === data.length - 1) {
            ctx.fillStyle = "#999";
            ctx.font = "9px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(d.t, xi, H - 8);
        }
    }
    
    ctx.fillStyle = "#666";
    ctx.font = "10px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("K线图 \u00b7 " + data.length + "日", pl, 14);
}

function ask(q) {
    Q.push({r: "u", t: q});
    renderChat();
    
    // Agent thinking indicator
    Q.push({r: "ai", t: '<div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--blue);animation:pulse 1s infinite"></span> Agent\u5206\u6790\u4e2d...</div>'});
    renderChat();
    
    setTimeout(function() {
        // Remove thinking indicator
        Q.pop();
        
        var ql = q.toLowerCase();
        var r = "";
        var agentSteps = [];
        var stockResults = [];
        
        // Step 1: Intent analysis + Step 2: Multi-factor screening
        var isTech = ql.indexOf("macd") > -1 || ql.indexOf("kdj") > -1 || ql.indexOf("\u5747\u7ebf") > -1 || ql.indexOf("k\u7ebf") > -1 || ql.indexOf("\u6280\u672f") > -1;
        var isFund = ql.indexOf("pe") > -1 || ql.indexOf("\u4f30\u503c") > -1 || ql.indexOf("roe") > -1 || ql.indexOf("\u4e1a\u7ee9") > -1 || ql.indexOf("\u57fa\u672c\u9762") > -1;
        var isFlow = ql.indexOf("\u4e3b\u529b") > -1 || ql.indexOf("\u8d44\u91d1") > -1 || ql.indexOf("\u6d41\u5165") > -1 || ql.indexOf("\u653e\u91cf") > -1;
        var isAi = ql.indexOf("ai") > -1 || ql.indexOf("\u673a\u5668\u4eba") > -1;
        
        for (var i = 0; i < STOCKS.length; i++) {
            var s = STOCKS[i];
            var match = false;
            if (isTech && (s.v || "").length > 0) match = true;
            if (isFund && (s.se || "").length > 0) match = true;
            if (isFlow && (s.f || "").length > 0) match = true;
            if (isAi && (s.n.indexOf("\u667a\u80fd") > -1 || s.n.indexOf("\u673a\u5668") > -1 || s.n.indexOf("\u8baf\u98de") > -1)) match = true;
            if (ql.indexOf(s.c) > -1 || ql.indexOf(s.n.substring(0, 2)) > -1) match = true;
            if (match) stockResults.push(s);
        }
        
        stockResults.sort(function(a, b) {
            var order = {strong: 0, watch: 1, observe: 2};
            return (order[a.l] || 3) - (order[b.l] || 3);
        });
