// ====== UTILITIES ======
function $(id) { return document.getElementById(id); }

function toast(msg) {
    var t = $("tt");
    if (!t) return;
    t.textContent = msg;
    clearTimeout(t._to);
    t.className = "toast sh";
        t._to = setTimeout(function() {
        t.className = "toast";
    }, 1800);
}

function login(u, p) {
    for (var i = 0; i < USERS.length; i++) {
        if (USERS[i].u === u && USERS[i].p === p) {
            CUR = USERS[i];
            localStorage.setItem("yu_c", u);
            var wd = localStorage.getItem("yw_" + u);
            W = wd ? JSON.parse(wd) : [];
            updateUI();
            return true;
        }
    }
    return false;
}

function reg(u, p) {
    for (var i = 0; i < USERS.length; i++) {
        if (USERS[i].u === u) return false;
    }
    USERS.push({u: u, p: p, t: Date.now()});
    localStorage.setItem("yu", JSON.stringify(USERS));
    return login(u, p);
}

function logout() {
    CUR = null;
    localStorage.removeItem("yu_c");
    W = [];
    updateUI();
    toast("已退出登录");
}

function updateUI() {
    var d = $("uS");
    var b = $("lB");
    if (d) d.textContent = CUR ? CUR.u : "未登录";
    if (b) b.textContent = CUR ? "退出" : "登录";

function inWatch(code) {
    return W.indexOf(code) > -1;

function toggleWatch(code) {
    var i = W.indexOf(code);
    if (i > -1) {
        W.splice(i, 1);
        toast("已移除自选");
    } else {
        W.push(code);
        toast("已添加自选");
    }
    if (CUR) {
        localStorage.setItem("yw_" + CUR.u, JSON.stringify(W));
    } else {
        localStorage.setItem("yw", JSON.stringify(W));
    }
}

// ====== VIP APPLICATION SYSTEM ======
function getVIPApps() {
    return JSON.parse(localStorage.getItem("yv_apps") || "[]");
}
function saveVIPApps(apps) {
    localStorage.setItem("yv_apps", JSON.stringify(apps));
}
function isVIP() {
    if (!CUR) return false;
    if (CUR.r === "admin") return true;
    var apps = getVIPApps();
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === CUR.u && apps[i].approved) return true;
    }
    return false;
}
function refreshVIP() {
    VIP = isVIP();
    updateUI();
}
function applyVIP() {
    if (!CUR) { toast("请先登录"); return; }
    if (isVIP()) { toast("您已是用户"); return; }
    var apps = getVIPApps();
    // Check if already applied
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === CUR.u) {
            if (apps[i].approved) { toast("您已是用户"); return; }
            toast("已提交请求，请等待管理员审核");
            return;
        }
    }
    apps.push({u: CUR.u, t: Date.now(), approved: false});
    saveVIPApps(apps);
    toast("用户请求已提交，请联系管理员(admin)审核");
}

function deleteUser(u) {
    if (!CUR || CUR.r !== "admin") { toast("无权限"); return; }
    if (u === "admin") { toast("不能删除管理员"); return; }
    var confirmed = confirm("确定删除用户 " + u + " ？");
    if (!confirmed) return;
    var found = false;
    for (var i = 0; i < USERS.length; i++) {
        if (USERS[i].u === u) {
            USERS.splice(i, 1);
            found = true;
            break;
        }
    }
    if (found) {
        localStorage.setItem("yu", JSON.stringify(USERS));
        // Also remove their watchlist
        localStorage.removeItem("yw_" + u);
        toast("已删除用户: " + u);
        // Refresh admin panel
        var m = document.querySelector(".mo.sh");
        if (m) m.remove();
        showAdminPanel();
    } else {
        toast("未找到用户");
    }
}

function showAdminPanel() {
    if (!CUR || CUR.r !== "admin") { toast("无权限"); return; }
    var apps = getVIPApps();
    var pending = apps.filter(function(a) { return !a.approved && !a.rejected; });
    var approved = apps.filter(function(a) { return a.approved; });
    var m = document.createElement("div");
    m.className = "mo sh";
    m.onclick = function(e) { if (e.target === this) m.remove(); };
    var h = '<div class="mx"><h3>🔐 管理员后台</h3><div class="st" style="font-size:12px">👤 当前管理员：' + CUR.u + '</div>';
    h += '<div class="st">📋 待审核用户请求 (' + pending.length + ')</div>';
    if (pending.length === 0) {
        h += '<div style="font-size:11px;color:var(--t3);padding:8px;text-align:center">暂无待审核请求</div>';
    } else {
        for (var i = 0; i < pending.length; i++) {
            var a = pending[i];
            var dt = new Date(a.t);
            h += '<div style="background:var(--bg);border-radius:8px;padding:8px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">';
            h += '<div><div style="font-weight:600;font-size:13px">👤 ' + a.u + '</div><div style="font-size:10px;color:var(--t3)">请求时间：' + dt.toLocaleString() + '</div></div>';
            h += '<div style="display:flex;gap:4px"><button class="bs bp" style="font-size:10px;padding:4px 8px" onclick="approveVIP(\'' + a.u + '\');document.querySelector(\'.mo.sh\').remove();showAdminPanel()">✅ 通过</button>';
            h += '<button class="bs bo" style="font-size:10px;padding:4px 8px" onclick="rejectVIP(\'' + a.u + '\');document.querySelector(\'.mo.sh\').remove();showAdminPanel()">❌ 拒绝</button></div></div>';
        }
    }
    if (approved.length > 0) {
        h += '<div class="st">✅ 已通过用户 (' + approved.length + ')</div>';
        for (var i = 0; i < approved.length; i++) {
            h += '<div style="font-size:11px;padding:4px 6px;color:var(--green)">✅ ' + approved[i].u + '</div>';
        }
    }
    h += '<button class="bs bo" style="width:100%;padding:6px;margin-top:6px" onclick="document.querySelector(\'.mo.sh\').remove()">关闭</button></div>';
    m.innerHTML = h;
    document.body.appendChild(m);
}
function approveVIP(u) {
    var apps = getVIPApps();
    for (var i = 0; i < apps.length; i++) {
        if (apps[i].u === u) { apps[i].approved = true; break; }
    }
    saveVIPApps(apps);
    toast("已通过 " + u + " 的用户请求");
    refreshVIP();
}
function rejectVIP(u) {

// ====== K-LINE ======
function genKL(base, n) {
    var r = [];
    var p = base;
    for (var i = n - 1; i >= 0; i--) {
        var o = p * (1 + (Math.random() - 0.5) * 0.03);
        var c = o * (1 + (Math.random() - 0.5) * 0.04);
        var h = Math.max(o, c) * (1 + Math.random() * 0.015);
        var l = Math.min(o, c) * (1 - Math.random() * 0.015);
        p = c;
        r.push({
            t: new Date(Date.now() - i * 86400000).toLocaleDateString("zh-CN", {month:"2-digit",day:"2-digit"}),
            o: Math.round(o * 100) / 100,
            c: Math.round(c * 100) / 100,
            h: Math.round(h * 100) / 100,
            l: Math.round(l * 100) / 100,
            v: Math.round(Math.random() * 1000000)
        });
    }
    return r;
}

function drawKL(canvasId, data) {
    var cv = document.getElementById(canvasId);
    if (!cv || data.length < 2) return;
    var ctx = cv.getContext("2d");
    var W = cv.parentElement.clientWidth - 20 || 340;
    var H = 200;
    cv.width = W * 2;
    cv.height = H * 2;
    cv.style.width = W + "px";
    cv.style.height = H + "px";
    ctx.scale(2, 2);
    ctx.clearRect(0, 0, W, H);
    
    var pt = 25, pb = 30, pl = 50, pr = 15;
    var cw = W - pl - pr;
    var ch = H - pt - pb;
    var hi = -Infinity, lo = Infinity;
    for (var i = 0; i < data.length; i++) {
        if (data[i].h > hi) hi = data[i].h;
        if (data[i].l < lo) lo = data[i].l;
    }
    var rg = hi - lo || 1;
    
    function y(v) { return pt + ch - (v - lo) / rg * ch; }
    function x(i) { return pl + (i / (data.length - 1)) * cw; }
    
    // Grid lines
    ctx.strokeStyle = "#e0e0e0";
    ctx.lineWidth = 0.5;
    for (var i = 0; i <= 4; i++) {
        var yy = pt + (ch / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pl, yy);
        ctx.lineTo(pl + cw, yy);
        ctx.stroke();
        ctx.fillStyle = "#999";
        ctx.font = "9px sans-serif";
        ctx.fillText((hi - (i / 4) * rg).toFixed(2), 2, yy + 3);
    }
    
    // Candles
    for (var i = 0; i < data.length; i++) {
        var d = data[i];
        var xi = x(i);
        var wi = cw / data.length * 0.6;
        var isUp = d.c >= d.o;
        ctx.strokeStyle = isUp ? "#E53935" : "#43A047";
        ctx.fillStyle = isUp ? "#E53935" : "#43A047";
        ctx.lineWidth = 1;
        // Wick
        ctx.beginPath();
        ctx.moveTo(xi, y(d.h));
        ctx.lineTo(xi, y(d.l));
        ctx.stroke();
        // Body
        var bodyTop = y(Math.max(d.o, d.c));
        var bodyBot = y(Math.min(d.o, d.c));
        if (isUp) {
            ctx.fillRect(xi - wi/2, bodyTop, wi, bodyBot - bodyTop);
        } else {
            ctx.fillRect(xi - wi/2, bodyTop, wi, bodyBot - bodyTop);
        }
        // Date labels
        if (i % Math.ceil(data.length / 5) === 0 || i === data.length - 1) {
            ctx.fillStyle = "#999";
            ctx.font = "9px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(d.t, xi, H - 8);
        }
    }
    
    ctx.fillStyle = "#666";
    ctx.font = "10px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("K线图 \u00b7 " + data.length + "日", pl, 14);
}
