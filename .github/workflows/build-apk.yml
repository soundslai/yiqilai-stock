name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK (含 Platform 34 + Build-Tools 34.0.0)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          curl -fsSL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d "$HOME/android-sdk/cmdline-tools"
          mv "$HOME/android-sdk/cmdline-tools/cmdline-tools" "$HOME/android-sdk/cmdline-tools/latest"
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/android-sdk/cmdline-tools/latest/bin:$PATH"
          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"
          yes | sdkmanager --sdk_root="$HOME/android-sdk" --licenses
          yes | sdkmanager --sdk_root="$HOME/android-sdk" "platforms;android-34" "build-tools;34.0.0"

      - name: Install deps & sync
        run: |
          npm install --no-audit --no-fund
          npx cap sync android || npx cap copy android

      - name: Build Debug APK
        run: |
          sed -i 's/\r$//' android/gradlew
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yiqilai-stock-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
